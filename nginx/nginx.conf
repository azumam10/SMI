server {
    listen 80;
    listen [::]:80;
    # server_name diset ke "_" artinya: terima request dari HOSTNAME APAPUN
    # (localhost, 127.0.0.1, umamis.my.id, dst). Cocok untuk tahap development.
    # Nanti kalau sudah punya domain asli & masuk production, ganti jadi:
    #   server_name umamis.my.id www.umamis.my.id;
    # supaya nginx hanya merespons domain resmi (lebih aman & rapi).
    server_name _;

    error_log  /var/log/nginx/umamis.error.log;
    access_log /var/log/nginx/umamis.access.log;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 128M;

    # Folder storage Laravel dan vendor TIDAK BOLEH diakses langsung
    location ~ ^/(storage|bootstrap|vendor|database|tests|\.env) {
        deny all;
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ──────────────────────────────────────────────────────────
    # CATATAN PERBAIKAN:
    #   fastcgi_pass sebelumnya: "umamis:9000"
    #   Ini sebenarnya BENAR ARAHNYA (nginx -> php container),
    #   tapi nama service di docker-compose kita ganti jadi
    #   'umamis_php' agar konsisten dan jelas perannya.
    #   Disesuaikan di sini.
    # ──────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass umamis_php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}