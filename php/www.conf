[www]

user = www-data
group = www-data

; ──────────────────────────────────────────────────────────
; CATATAN PERBAIKAN:
;   Sebelumnya: listen = nginx_umamis:9000
;   Ini SALAH ARAH. PHP-FPM harus listen di hostname/IP
;   dirinya SENDIRI (container PHP), bukan hostname nginx.
;   Nginx-lah yang nanti melakukan fastcgi_pass ke hostname PHP.
;   Karena fpm berjalan di dalam container 'umamis', cukup
;   listen di semua interface container ini.
; ──────────────────────────────────────────────────────────
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 40
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 800
request_terminate_timeout = 300

clear_env = no